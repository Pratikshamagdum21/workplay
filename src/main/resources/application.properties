spring.application.name=demo
spring.datasource.url=jdbc:postgresql://ep-weathered-frog-aht536iv-pooler.c-3.us-east-1.aws.neon.tech:5432/neondb
spring.datasource.username=neondb_owner
spring.datasource.password=npg_fFB7dNg0ayzl
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=8081
# Changed from 'update' to 'none' — 'update' forces DB connection at startup,
# which wakes Neon on every Render restart/health ping cycle.
# Schema is already stable; use DatabaseMigration.java for any future changes.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Defer DB connection until first actual query — critical for Render + Neon combo
# This lets /health pings keep Render warm WITHOUT waking Neon compute
spring.jpa.defer-datasource-initialization=true
spring.datasource.hikari.initialization-fail-timeout=-1

# HikariCP connection pool — optimized for Render free + Neon free combo
# Start with 0 idle connections — only connect to Neon when a real DB request comes in
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.maximum-pool-size=5
# Close idle connections after 30 seconds — releases Neon compute quickly after use
spring.datasource.hikari.idle-timeout=30000
# Recycle connections every 10 minutes
spring.datasource.hikari.max-lifetime=600000
# Allow 20s for connection — covers Neon cold start (~3-5s) with margin
spring.datasource.hikari.connection-timeout=20000

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Database backup configuration
# Schedule: daily at 2 AM (cron: second minute hour day month weekday)
backup.cron=0 0 2 * * *
backup.directory=backups
backup.retention.count=7