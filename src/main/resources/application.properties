spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=8081
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HikariCP connection pool — balanced for Neon free plan (cost + UX)
# Keep 2 idle connections: enough for instant response on light traffic,
# low enough that Neon pooler doesn't see heavy activity
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
# Close idle connections after 2 minutes — balances connection reuse vs Neon suspend
spring.datasource.hikari.idle-timeout=120000
# Recycle connections every 10 minutes — reduces TLS handshake overhead
spring.datasource.hikari.max-lifetime=600000
# Allow 20s for connection — covers Neon cold start (~3-5s) with margin
spring.datasource.hikari.connection-timeout=20000
# Keepalive every 2 minutes — prevents Neon pooler from dropping idle connections
# without preventing Neon compute from suspending (pooler != compute)
spring.datasource.hikari.keepalive-time=120000

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB