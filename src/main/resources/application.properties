spring.application.name=demo
spring.datasource.url=jdbc:postgresql://ep-weathered-frog-aht536iv-pooler.c-3.us-east-1.aws.neon.tech:5432/neondb
spring.datasource.username=neondb_owner
spring.datasource.password=npg_fFB7dNg0ayzl
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=8081
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HikariCP connection pool — optimized for Neon free plan
# Keep only 1 idle connection instead of 10 to let Neon auto-suspend
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
# Close idle connections after 30 seconds (Neon suspends after ~5 min inactivity)
spring.datasource.hikari.idle-timeout=30000
# Recycle connections every 5 minutes to avoid stale connections after Neon suspend
spring.datasource.hikari.max-lifetime=300000
# Time out connection attempts after 10 seconds (Neon cold start can take a few seconds)
spring.datasource.hikari.connection-timeout=10000

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB